<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <style type="text/css"><![CDATA[
    .dashboard-text {
      font-family: Inter, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .code-text {
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .building-face {
      stroke-linejoin: round;
      transition: all 0.3s ease;
    }
    path[fill="url(#top-face-gradient)"] {
      stroke: #4cf4ff;
      stroke-width: 0.8px;
    }
    path[fill="url(#left-face-gradient)"] {
      stroke: #00F0FF;
      stroke-opacity: 0.7;
    }
    path[fill="url(#right-face-gradient)"] {
      stroke: #00c0cc;
      stroke-opacity: 0.6;
    }
  ]]></style>

  <defs>

    <linearGradient id="left-face-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#234e93" stop-opacity="0.95" />
      <stop offset="40%" stop-color="#3B82F6" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.95" />
    </linearGradient>

    <linearGradient id="right-face-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#173462" stop-opacity="0.95" />
      <stop offset="40%" stop-color="#2f68c4" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00c0cc" stop-opacity="0.95" />
    </linearGradient>

    <linearGradient id="top-face-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#66f6ff" stop-opacity="0.98" />
    </linearGradient>

    <linearGradient id="reflection-gradient-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="reflection-gradient-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c0cc" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#2f68c4" stop-opacity="0.0" />
    </linearGradient>

    <filter id="ambient-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="bg-vignette" cx="50%" cy="48%" r="72%">
      <stop offset="30%" stop-color="#0D1117" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.09" />
    </radialGradient>

    <linearGradient id="bg-vertical-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.018" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.022" />
    </linearGradient>

    <radialGradient id="floor-ambient-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0" />
    </radialGradient>

    <filter id="skyline-bloom" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="blur" in2="SourceGraphic" operator="over" />
    </filter>

    <filter id="bg-noise" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise" />
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended" />
      <feComposite in="blended" in2="SourceGraphic" operator="in" />
    </filter>

    <radialGradient id="grid-fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1.0" />
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </radialGradient>
    <mask id="grid-mask">
      <rect width="100%" height="100%" fill="url(#grid-fade)" />
    </mask>

    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0" />
      <stop offset="15%" stop-color="#00F0FF" stop-opacity="1" />
      <stop offset="85%" stop-color="#00F0FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="legend-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
  </defs>
  <!-- Background: transparent canvas -->
  <rect id="bg-base" width="1200" height="800" fill="none" />
  <!-- Vertical light gradient -->
  <rect width="1200" height="800" fill="url(#bg-vertical-grad)" />
  <!-- Radial vignette -->
  <rect width="1200" height="800" fill="url(#bg-vignette)" />
  <!-- Ambient skyline bloom -->
  <ellipse cx="600.0" cy="496.0" rx="456.0" ry="128.0" fill="url(#floor-ambient-glow)" opacity="1" />

  <g id="skyline-scene" transform="translate(39.5, 17.13) scale(0.9342)">
  <ellipse cx="600.0" cy="450.0" rx="450" ry="180" fill="url(#floor-ambient-glow)" />
  <path class="floor-grid" d="M 201.63,150.0 L 1119.62,680.0 M 184.31,160.0 L 1102.29,690.0 M 166.99,170.0 L 1084.97,700.0 M 149.67,180.0 L 1067.65,710.0 M 132.35,190.0 L 1050.33,720.0 M 115.03,200.0 L 1033.01,730.0 M 97.71,210.0 L 1015.69,740.0 M 80.38,220.0 L 998.37,750.0 M 201.63,150.0 L 80.38,220.0 M 218.95,160.0 L 97.71,230.0 M 236.27,170.0 L 115.03,240.0 M 253.59,180.0 L 132.35,250.0 M 270.91,190.0 L 149.67,260.0 M 288.23,200.0 L 166.99,270.0 M 305.55,210.0 L 184.31,280.0 M 322.87,220.0 L 201.63,290.0 M 340.19,230.0 L 218.95,300.0 M 357.51,240.0 L 236.27,310.0 M 374.83,250.0 L 253.59,320.0 M 392.15,260.0 L 270.91,330.0 M 409.47,270.0 L 288.23,340.0 M 426.79,280.0 L 305.55,350.0 M 444.12,290.0 L 322.87,360.0 M 461.44,300.0 L 340.19,370.0 M 478.76,310.0 L 357.51,380.0 M 496.08,320.0 L 374.83,390.0 M 513.4,330.0 L 392.15,400.0 M 530.72,340.0 L 409.47,410.0 M 548.04,350.0 L 426.79,420.0 M 565.36,360.0 L 444.12,430.0 M 582.68,370.0 L 461.44,440.0 M 600.0,380.0 L 478.76,450.0 M 617.32,390.0 L 496.08,460.0 M 634.64,400.0 L 513.4,470.0 M 651.96,410.0 L 530.72,480.0 M 669.28,420.0 L 548.04,490.0 M 686.6,430.0 L 565.36,500.0 M 703.92,440.0 L 582.68,510.0 M 721.24,450.0 L 600.0,520.0 M 738.56,460.0 L 617.32,530.0 M 755.88,470.0 L 634.64,540.0 M 773.21,480.0 L 651.96,550.0 M 790.53,490.0 L 669.28,560.0 M 807.85,500.0 L 686.6,570.0 M 825.17,510.0 L 703.92,580.0 M 842.49,520.0 L 721.24,590.0 M 859.81,530.0 L 738.56,600.0 M 877.13,540.0 L 755.88,610.0 M 894.45,550.0 L 773.21,620.0 M 911.77,560.0 L 790.53,630.0 M 929.09,570.0 L 807.85,640.0 M 946.41,580.0 L 825.17,650.0 M 963.73,590.0 L 842.49,660.0 M 981.05,600.0 L 859.81,670.0 M 998.37,610.0 L 877.13,680.0 M 1015.69,620.0 L 894.45,690.0 M 1033.01,630.0 L 911.77,700.0 M 1050.33,640.0 L 929.09,710.0 M 1067.65,650.0 L 946.41,720.0 M 1084.97,660.0 L 963.73,730.0 M 1102.29,670.0 L 981.05,740.0 M 1119.62,680.0 L 998.37,750.0" fill="none" stroke="#8B5CF6" stroke-opacity="0.15" stroke-width="1.0" filter="url(#neon-glow)" mask="url(#grid-mask)" />

  <!-- Reflections -->
  <path d="M 377.95,370.0 L 377.95,376.75 L 392.15,384.95 L 392.15,378.2 Z" fill="url(#reflection-gradient-left)" opacity="0.4" />
  <path d="M 392.15,378.2 L 392.15,384.95 L 406.36,376.75 L 406.36,370.0 Z" fill="url(#reflection-gradient-right)" opacity="0.4" />
  <path d="M 759.0,590.0 L 759.0,596.75 L 773.21,604.95 L 773.21,598.2 Z" fill="url(#reflection-gradient-left)" opacity="0.4" />
  <path d="M 773.21,598.2 L 773.21,604.95 L 787.41,596.75 L 787.41,590.0 Z" fill="url(#reflection-gradient-right)" opacity="0.4" />
  <path d="M 1001.49,670.0 L 1001.49,676.75 L 1015.69,684.95 L 1015.69,678.2 Z" fill="url(#reflection-gradient-left)" opacity="0.4" />
  <path d="M 1015.69,678.2 L 1015.69,684.95 L 1029.9,676.75 L 1029.9,670.0 Z" fill="url(#reflection-gradient-right)" opacity="0.4" />
  <!-- Ground Shadows -->
  <path d="M 392.15,364.8 L 377.95,373.0 L 392.15,381.2 L 406.36,373.0 Z M 773.21,584.8 L 759.0,593.0 L 773.21,601.2 L 787.41,593.0 Z M 1015.69,664.8 L 1001.49,673.0 L 1015.69,681.2 L 1029.9,673.0 Z" fill="#000000" filter="url(#ambient-shadow)" opacity="0.6" />
  <!-- Isometric Buildings -->
  <g>
    <path class="building-face" d="M 377.95,370.0 L 377.95,355.0 L 392.15,363.2 L 392.15,378.2 Z" fill="url(#left-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 392.15,378.2 L 392.15,363.2 L 406.36,355.0 L 406.36,370.0 Z" fill="url(#right-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 392.15,346.8 L 377.95,355.0 L 392.15,363.2 L 406.36,355.0 Z" fill="url(#top-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
  </g>
  <g>
    <path class="building-face" d="M 759.0,590.0 L 759.0,575.0 L 773.21,583.2 L 773.21,598.2 Z" fill="url(#left-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 773.21,598.2 L 773.21,583.2 L 787.41,575.0 L 787.41,590.0 Z" fill="url(#right-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 773.21,566.8 L 759.0,575.0 L 773.21,583.2 L 787.41,575.0 Z" fill="url(#top-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
  </g>
  <g>
    <path class="building-face" d="M 1001.49,670.0 L 1001.49,655.0 L 1015.69,663.2 L 1015.69,678.2 Z" fill="url(#left-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 1015.69,678.2 L 1015.69,663.2 L 1029.9,655.0 L 1029.9,670.0 Z" fill="url(#right-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
    <path class="building-face" d="M 1015.69,646.8 L 1001.49,655.0 L 1015.69,663.2 L 1029.9,655.0 Z" fill="url(#top-face-gradient)" stroke="#00F0FF" stroke-width="0.5" opacity="0.9" />
  </g>
  </g>
  <g class="dashboard-text">
    <text x="50" y="58" fill="#3B82F6" font-size="11" font-weight="800" letter-spacing="3px" opacity="0.4">GITHUB // SKYLINE</text>
    <text x="50" y="96" fill="#8B5CF6" font-size="30" font-weight="900" letter-spacing="-0.5px">@DURGESH729</text>
    <g transform="translate(50, 112)">
      <rect x="0" y="0" width="80.0" height="20" rx="10" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="0.8" />
      <text x="40.0" y="14" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="700" letter-spacing="0.8px">2025</text>
    </g>
    <text x="1150" y="55" text-anchor="end" fill="#3B82F6" font-size="10" font-weight="700" letter-spacing="1.5px" opacity="0.4">TOTAL CONTRIBUTIONS</text>
    <text x="1150" y="92" text-anchor="end" fill="#8B5CF6" font-size="32" font-weight="900" letter-spacing="-0.5px" class="code-text">3</text>
    <text x="940" y="55" text-anchor="end" fill="#3B82F6" font-size="10" font-weight="700" letter-spacing="1.5px" opacity="0.4">BUSIEST DAILY COUNT</text>
    <text x="940" y="92" text-anchor="end" fill="#8B5CF6" font-size="32" font-weight="900" letter-spacing="-0.5px" class="code-text">1 <tspan font-size="14" font-weight="700" opacity="0.5">MAX</tspan></text>
    <text x="710" y="55" text-anchor="end" fill="#3B82F6" font-size="10" font-weight="700" letter-spacing="1.5px" opacity="0.4">LONGEST STREAK</text>
    <text x="710" y="92" text-anchor="end" fill="#8B5CF6" font-size="32" font-weight="900" letter-spacing="-0.5px" class="code-text">25 <tspan font-size="14" font-weight="700" opacity="0.5">DAYS</tspan></text>
    <text x="500" y="55" text-anchor="end" fill="#3B82F6" font-size="10" font-weight="700" letter-spacing="1.5px" opacity="0.4">CURRENT STREAK</text>
    <text x="500" y="92" text-anchor="end" fill="#8B5CF6" font-size="32" font-weight="900" letter-spacing="-0.5px" class="code-text">0 <tspan font-size="14" font-weight="700" opacity="0.5">DAYS</tspan></text>
    <text x="50" y="763" fill="#3B82F6" font-size="10" font-weight="700" letter-spacing="1.5px" opacity="0.4">INTENSITY</text>
    <text x="168" y="763" text-anchor="end" fill="#3B82F6" font-size="9" font-weight="700" letter-spacing="0.8px" opacity="0.4">LOW</text>
    <rect x="180" y="754" width="120" height="9" rx="4.5" fill="url(#legend-gradient)" />
    <rect x="180" y="754" width="120" height="9" rx="4.5" fill="none" stroke="#8B5CF6" stroke-opacity="0.25" stroke-width="0.8" />
    <text x="312" y="763" fill="#3B82F6" font-size="9" font-weight="700" letter-spacing="0.8px" opacity="0.4">HIGH</text>
    <line x1="50" y1="210.00000000000006" x2="1150" y2="210.00000000000006" stroke="#8B5CF6" stroke-opacity="0.08" stroke-width="0.8" stroke-dasharray="3,6" />
  </g>

</svg>
