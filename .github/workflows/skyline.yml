name: Generate GitHub Skyline

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
    # Runs at 12:00 UTC every Sunday
    - cron: '0 12 * * 0'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: skyline-generator
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Test Suite
        run: |
          python -m pytest tests/

      - name: Run Skyline Generation Pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python skyline.py --all --json

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage changed generated assets and audit artifacts
          git add assets/ docs/data/ docs/audit/
          
          # Only commit and push if there are staged differences
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update skyline assets and audit report [skip ci]"
            git push origin main
            echo "Successfully committed and pushed updated contribution skyline assets."
          else
            echo "No contribution changes detected. Skipping repository commit."
          fi
